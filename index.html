<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <title>Laika ziņas</title>
  <link rel="stylesheet" href="style.css">
<style>
  body{
    font-family: Verdana, Geneva, Tahoma, sans-serif;
    font-size: 1.5em;
    text-align: center;
  }
  table {
    border-collapse: collapse;
    margin: 20px;
    margin: auto;
  }
  
  th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
  }
 
</style>
</head>
<body>
<h3>Laika ziņas Rīga</h3>
<table>
  <tr>
    <th contenteditable="true">O</th>
    <th contenteditable="true">T</th>
    <th contenteditable="true">C</th>
  </tr>
  <tr>
    <td class="image-cell" onclick="toggleDropdown(this)">
      <img src="./weather4.png" alt="Selected">
      <div class="dropdown">
        <img src="./weather2.png" onclick="selectImage(this)">
        <img src="./weather3.png" onclick="selectImage(this)">
        <img src="./weather4.png" onclick="selectImage(this)">
        <img src="./weather5.png" onclick="selectImage(this)">
        <img src="./weather6.png" onclick="selectImage(this)">
      </div>
    </td>
    <td class="image-cell" onclick="toggleDropdown(this)">
      <img src="./weather3.png" alt="Selected">
      <div class="dropdown">
        <img src="./weather2.png" onclick="selectImage(this)">
        <img src="./weather3.png" onclick="selectImage(this)">
        <img src="./weather4.png" onclick="selectImage(this)">
        <img src="./weather5.png" onclick="selectImage(this)">
        <img src="./weather6.png" onclick="selectImage(this)">
      </div>
    </td>
    <td class="image-cell" onclick="toggleDropdown(this)">
      <img src="./weather3.png" alt="Selected">
      <div class="dropdown">
        <img src="./weather2.png" onclick="selectImage(this)">
        <img src="./weather3.png" onclick="selectImage(this)">
        <img src="./weather4.png" onclick="selectImage(this)">
        <img src="./weather5.png" onclick="selectImage(this)">
        <img src="./weather6.png" onclick="selectImage(this)">
      </div>
    </td>
  </tr>
  <tr>
    <td><b><span contenteditable="true">4</span>°</b>  <span contenteditable="true"></span>2</span>°</td>
    <td><b><span contenteditable="true">5</span>°</b>  <span contenteditable="true">-1</span>°</td>
    <td><b><span contenteditable="true">4</span>°</b>  <span contenteditable="true">-1</span>°</td>
  </tr>
</table>

<p style="font-size: small;">ziņu avots Google</p>
<p style="font-size: small;" id="dateTime"></p>
<script>

function updateDateTime() {
            const now = new Date();
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            const formattedDateTime = `${year}.${month}.${day} ${hours}:${minutes}`;
            document.getElementById('dateTime').textContent = "Dati atjaunoti " + formattedDateTime;
        }
        
        updateDateTime();
        setInterval(updateDateTime, 1000); // Update every second

function toggleDropdown(cell) {
  const dropdown = cell.querySelector('.dropdown');
  dropdown.classList.toggle('show');
}

function selectImage(imgElement) {
  const cell = imgElement.closest('.image-cell');
  const displayImg = cell.querySelector('img:first-child');
  displayImg.src = imgElement.src;
  
  // Close dropdown after selection
  const dropdown = cell.querySelector('.dropdown');
  dropdown.classList.remove('show');
}

// Close dropdown when clicking outside
document.addEventListener('click', function(event) {
  if (!event.target.closest('.image-cell')) {
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
  }
});
</script>

</body>
</html>
